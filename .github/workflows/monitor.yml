name: Synthetic Target Monitor

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to execute against'
        required: true
        default: 'https://silkhire.uz/'
      user_count:
        description: 'Number of test users to create'
        required: true
        default: '5'
      delay_ms:
        description: 'Delay between creations (ms)'
        required: true
        default: '2000'

jobs:
  execute-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Execute Headless Engine
        # Passes all three variables from the UI to the Python script
        run: python monitor.py --url ${{ github.event.inputs.target_url }} --limit ${{ github.event.inputs.user_count }} --delay ${{ github.event.inputs.delay_ms }}

      - name: Upload Visual Telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-telemetry
          path: artifacts/*.png
          retention-days: 7