name: Synthetic Target Monitor

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to execute against'
        required: true
        default: 'https://silkhire.uz/'
      user_count:
        description: 'Total number of users to create'
        required: true
        default: '5'
      concurrency:
        description: 'Parallel workers (Keep between 3-5 for Actions)'
        required: true
        default: '3'

jobs:
  execute-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Critical Fix: Added 'faker' here so the python script can generate real names
      - name: Install System Dependencies
        run: |
          pip install playwright faker
          playwright install --with-deps chromium

      - name: Execute High-Speed Engine
        run: python monitor.py --url ${{ github.event.inputs.target_url }} --limit ${{ github.event.inputs.user_count }} --concurrency ${{ github.event.inputs.concurrency }}

      - name: Upload Visual Telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-telemetry
          path: artifacts/*.png
          retention-days: 7